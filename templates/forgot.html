{% extends "base.html" %}
{% block title %}Reset password · Golf Booker{% endblock %}
{% block content %}
<div class="card flow" style="max-width: 24rem; margin-inline: auto;">
  <h1>Reset password</h1>

  {% if let Some(message) = message %}
    <p class="alert" data-variant="info" role="status">{{ message }}</p>
  {% endif %}

  <form method="post" action="/forgot" class="flow">
    <label>
      Email
      <input class="input" type="email" name="email" autocomplete="email" required autofocus>
    </label>
    <button class="button" type="submit">Email me a reset link</button>
  </form>
  <p><a href="/login">Back to sign in</a></p>
</div>
{% endblock %}
