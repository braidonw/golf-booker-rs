{% extends "base.html" %}
{% block title %}Sign in · Golf Booker{% endblock %}
{% block content %}
<div class="card flow" style="max-width: 24rem; margin-inline: auto;">
  <h1>Sign in</h1>

  {% if let Some(message) = message %}
    <p class="alert" data-variant="danger" role="alert">{{ message }}</p>
  {% endif %}

  <form method="post" action="/login" class="flow">
    {% if let Some(next) = next %}
      <input type="hidden" name="next" value="{{ next }}">
    {% endif %}
    <label>
      Username
      <input class="input" type="text" name="username" autocomplete="username" required autofocus>
    </label>
    <label>
      Password
      <input class="input" type="password" name="password" autocomplete="current-password" required>
    </label>
    <button class="button" type="submit">Sign in</button>
  </form>
  <p><a href="/forgot">Forgot password?</a></p>
</div>
{% endblock %}
